name: Quickr
options:
  bundleIdPrefix: app.faith
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 8FPW6R3KM5
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Quickr:
    type: application
    platform: macOS
    sources:
      - path: Quickr
        excludes:
          - Info.plist
    info:
      path: Quickr/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.faith.quickr
        PRODUCT_NAME: Quickr
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Quickr/Info.plist
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
